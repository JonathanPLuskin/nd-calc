<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black"><meta name="apple-mobile-web-app-title" content="ND Calc"><title>ND Filter Calculator</title><style>*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:#0d0d0d;color:#e8e0d0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif}body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}.wrap{max-width:480px;margin:0 auto;padding:2rem 1.25rem}.title{font-size:11px;letter-spacing:0.14em;color:#8a7a60;text-transform:uppercase;margin-bottom:1.75rem}.grid{display:grid;grid-template-columns:1fr 1fr;gap:0.875rem;margin-bottom:1.5rem}.field{display:flex;flex-direction:column;gap:6px}label{font-size:11px;letter-spacing:0.1em;color:#8a7a60;text-transform:uppercase}select{background:#1a1a1a;border:0.5px solid #3a3020;border-radius:8px;color:#e8e0d0;font-size:16px;padding:11px 12px;width:100%;outline:none;appearance:none;-webkit-appearance:none}select:focus{border-color:#c8a84b}.result-box{background:#1a1a1a;border:0.5px solid #3a3020;border-radius:12px;padding:2rem 1.5rem;text-align:center;margin-bottom:1.5rem}.nd-label{font-size:11px;letter-spacing:0.14em;color:#8a7a60;text-transform:uppercase;margin-bottom:0.75rem}.nd-value{font-size:56px;font-weight:500;color:#c8a84b;letter-spacing:0.02em}.nd-none{font-size:18px;color:#5a4e38}.hint{font-size:11px;color:#5a4e38;letter-spacing:0.04em;text-align:center}</style></head><body><div class="wrap">  <div class="title">ND Filter Calculator</div>  <div class="grid">    <div class="field">      <label>Exposure shutter</label>      <select id="ss_correct"></select>    </div>    <div class="field">      <label>Target shutter</label>      <select id="ss_target"></select>    </div>    <div class="field">      <label>ISO</label>      <select id="iso">        <option>100</option><option>200</option><option>400</option>        <option>800</option><option>1600</option><option>3200</option>      </select>    </div>    <div class="field">      <label>Frame rate</label>      <select id="fps">        <option>23.976</option><option>24</option><option>25</option>        <option selected>30</option><option>48</option><option>50</option>        <option>60</option><option>120</option><option>240</option>      </select>    </div>    <div class="field">      <label>f-stop</label>      <select id="fstop">        <option>f/1.2</option><option>f/1.4</option><option>f/1.8</option><option>f/2</option>        <option>f/2.8</option><option>f/4</option><option>f/5.6</option><option>f/8</option>        <option>f/11</option><option>f/16</option><option>f/22</option>      </select>    </div>  </div>  <div class="result-box">    <div class="nd-label">Use this ND filter</div>    <div id="out_nd"><span class="nd-none">No ND needed</span></div>  </div>  <div class="hint">180ˇ rule: target = 1/(fps ? 2)</div></div><script>const SS=[  {l:"2s",v:2},{l:"1.6s",v:1.6},{l:"1.3s",v:1.3},{l:"1s",v:1},  {l:"0.8s",v:0.8},{l:"0.6s",v:0.6},{l:"1/2",v:0.5},{l:"1/3",v:1/3},  {l:"1/4",v:0.25},{l:"1/5",v:0.2},{l:"1/6",v:1/6},{l:"1/8",v:0.125},  {l:"1/10",v:0.1},{l:"1/13",v:1/13},{l:"1/15",v:1/15},{l:"1/20",v:0.05},  {l:"1/25",v:0.04},{l:"1/30",v:1/30},{l:"1/40",v:1/40},{l:"1/50",v:0.02},  {l:"1/60",v:1/60},{l:"1/80",v:1/80},{l:"1/100",v:0.01},{l:"1/125",v:1/125},  {l:"1/160",v:1/160},{l:"1/200",v:0.005},{l:"1/250",v:0.004},{l:"1/320",v:1/320},  {l:"1/400",v:0.0025},{l:"1/500",v:0.002},{l:"1/640",v:1/640},{l:"1/800",v:1/800},  {l:"1/1000",v:0.001},{l:"1/1250",v:1/1250},{l:"1/1600",v:1/1600},  {l:"1/2000",v:0.0005},{l:"1/2500",v:1/2500},{l:"1/3200",v:1/3200},  {l:"1/4000",v:0.00025},{l:"1/5000",v:0.0002},{l:"1/6400",v:1/6400}];const ND=[  {s:1,n:"ND2"},{s:2,n:"ND4"},{s:3,n:"ND8"},{s:4,n:"ND16"},  {s:5,n:"ND32"},{s:6,n:"ND64"},{s:7,n:"ND128"},{s:8,n:"ND256"},  {s:9,n:"ND512"},{s:10,n:"ND1000"},{s:13,n:"ND8000"},  {s:16,n:"ND65000"},{s:20,n:"ND1000000"}];const sC=document.getElementById("ss_correct"),sT=document.getElementById("ss_target");SS.forEach((s,i)=>{sC.appendChild(new Option(s.l,i));sT.appendChild(new Option(s.l,i))});sC.value=37; sT.value=20;function calc(){  const c=SS[+sC.value].v, t=SS[+sT.value].v, el=document.getElementById("out_nd");  if(t<=c){el.innerHTML='<span class="nd-none">No ND needed</span>';return}  const stops=Math.log2(t/c);  const nd=ND.find(n=>n.s>=stops)||ND[ND.length-1];  el.innerHTML='<span class="nd-value">'+nd.n+'</span>';}["ss_correct","ss_target","iso","fps","fstop"].forEach(id=>document.getElementById(id).addEventListener("change",calc));calc();</script></body></html>
